#Application Build Workflow
name: Build and publish AWS-lens application to Amazon ECR

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: 477059411744.dkr.ecr.eu-west-3.amazonaws.com/vp/vp-aws-lens
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  image_tag: ${{ github.sha }}
           

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Build Application
        run: |
          echo "Building the AWS-lens application..."
          docker build -t ${{ env.ECR_REPOSITORY }}:${{ env.image_tag }} .
          echo "Build completed successfully."
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to Amazon ECR
        run: |
          echo "Pushing to Amazon ECR..."
          docker push ${{ env.ECR_REPOSITORY }}:${{ env.image_tag }}
          echo "Push completed successfully."

    